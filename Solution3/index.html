<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Toggle Theme</title>
</head>
<body>
    <div class="show" id="lalala">
        jshdjghblksrdbgsg
    </div>
    <button onClick="toggleTheme()">show/hide</button>

    <script>
        function toggleTheme() {
            const element = document.querySelector("#lalala")
            if (element.style.display == "block") {
                element.style.display = "none"
            }
            else {
                element.style.display = "block"
            }
        }
    </script>
</body>
</html>
