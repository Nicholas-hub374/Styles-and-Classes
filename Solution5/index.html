<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>Objects List</title>
    <style>
        .changeRed{
            color: red;
        }
    </style>
</head>
<body>
    <h2>רשימת אובייקטים:</h2>
    <div id="container" onclick="myFunc(0)">123</div>
    <div id="container" onclick="myFunc(1)">123</div>
    <div id="container" onclick="myFunc(2)">123</div>
    <div id="container" onclick="myFunc(3)">123</div>

    <script>
        let containers = document.querySelectorAll("#container")
        
        function myFunc(index) {
            let parg = containers[index]
            parg.classList.toggle("changeRed")
        }
    </script>
</body>
</html>
