<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>Tab Switcher</title>
</head>
<body>

    <h2>בחר כרטיסייה:</h2>
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab(0)">טאב 1</button>
        <button class="tab-btn" onclick="showTab(1)">טאב 2</button>
        <button class="tab-btn" onclick="showTab(2)">טאב 3</button>
    </div>

    <div><p id="display">Change</p></div>

    <script>
        const tabTexts = ["ברוך הבא", "מידע נוסף", "צור קשר"];

        function showTab(index) {
            let parg = document.getElementById("display")
            parg.textContent = tabTexts[index]
        }

        showTab(0)
    </script>

</body>
</html>
